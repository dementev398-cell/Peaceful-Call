# ------------------------------------------------------------------------------
# Free-tier friendly Render Blueprint for Peaceful Call.
# One Node/Express service builds and serves both the API and the React frontend.
# You must provide an external PostgreSQL database (e.g. Supabase, Neon) via
# the DATABASE_URL env var. On free plans Render's managed Postgres is not
# available, so migrations are run automatically at startup instead of in a
# pre-deploy command.
# ------------------------------------------------------------------------------

services:
  - type: web
    name: peaceful-call
    runtime: node
    region: frankfurt
    plan: starter
    buildCommand: >
      pnpm install --frozen-lockfile &&
      pnpm --filter @workspace/api-server --filter @workspace/chat-hub run build
    # Run migrations on every startup (drizzle-kit push is idempotent and safe
    # for additive schema changes) then start the API. This avoids the paid
    # pre-deploy command feature on Render.
    startCommand: >
      NODE_ENV=production pnpm --filter @workspace/db run push &&
      NODE_ENV=production node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # External PostgreSQL connection string (e.g. from Supabase or Neon).
      # Format: postgres://user:password@host:port/database
      - key: DATABASE_URL
        sync: false
      # Clerk production keys. The VITE-prefixed key is needed at build time
      # for the frontend; the non-VITE key is used by the backend.
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: SESSION_SECRET
        sync: false
      # CORS: for a single-service deploy the frontend is same-origin, so this
      # can be left empty. If you also access the API from another domain, set
      # a comma-separated allowlist here (e.g. https://your-domain.onrender.com).
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      # Object storage on Render uses S3 (no GCS sidecar available).
      - key: OBJECT_STORAGE_PROVIDER
        value: s3
      - key: S3_REGION
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_BUCKET
        sync: false
      # Optional: S3-compatible endpoint (leave unset for AWS S3).
      # - key: S3_ENDPOINT
      #   sync: false
      - key: PUBLIC_OBJECT_SEARCH_PATHS
        sync: false
      - key: PRIVATE_OBJECT_DIR
        sync: false
