# -----------------------------------------------------------------------------
# Render-managed PostgreSQL database (persistent across deploys).
# Declaring the DB in the blueprint means Render provisions ONE database and
# keeps it across every redeploy — a redeploy never drops or recreates it.
# The connection string is wired into the API service via `fromDatabase` below.
# -----------------------------------------------------------------------------
databases:
  - name: peaceful-call-db
    plan: starter
    region: frankfurt

services:
  # ---------------------------------------------------------------------------
  # API — Node/Express backend
  # ---------------------------------------------------------------------------
  - type: web
    name: peaceful-call-api
    runtime: node
    region: frankfurt
    plan: starter
    buildCommand: >
      corepack enable &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    # Apply the Drizzle schema to the managed DB before each deploy goes live.
    # `drizzle-kit push` is idempotent and additive-safe: it creates missing
    # tables/columns without dropping existing data. It runs against the
    # DATABASE_URL injected from the managed database below.
    preDeployCommand: pnpm --filter @workspace/db run push
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      # CORS: comma-separated list of allowed origins (e.g. https://peaceful-call.onrender.com)
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      # Object storage — use 's3' on Render (no GCS sidecar available)
      - key: OBJECT_STORAGE_PROVIDER
        value: s3
      - key: S3_REGION
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_BUCKET
        sync: false
      # Optional: S3-compatible endpoint (leave unset for AWS S3)
      # - key: S3_ENDPOINT
      #   sync: false
      - key: PUBLIC_OBJECT_SEARCH_PATHS
        sync: false
      - key: PRIVATE_OBJECT_DIR
        sync: false
      # Auto-provided by the Render-managed database declared above.
      # This persists across deploys and is never wiped by a redeploy.
      - key: DATABASE_URL
        fromDatabase:
          name: peaceful-call-db
          property: connectionString
      - key: SESSION_SECRET
        sync: false

  # ---------------------------------------------------------------------------
  # Frontend — React/Vite static site
  # ---------------------------------------------------------------------------
  - type: web
    name: peaceful-call-web
    runtime: static
    region: frankfurt
    buildCommand: >
      corepack enable &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @workspace/chat-hub run build
    staticPublishPath: artifacts/chat-hub/dist/public
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
      # Full URL of the API service (e.g. https://peaceful-call-api.onrender.com)
      # Leave empty only if serving frontend and API from the same origin.
      - key: VITE_API_BASE_URL
        sync: false
      # Optional: override the Clerk proxy URL if using a custom domain
      # - key: VITE_CLERK_PROXY_URL
      #   sync: false
